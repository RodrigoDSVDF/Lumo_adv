<body>

<div id="canvas-container"></div>

<div class="app-wrapper">
    <header>
        <div class="brand">Protocolo</div>
        <div class="title">Frequência Mental Poderosa</div>
    </header>

    <div id="chat-flow">
        <div id="cta-wrapper">
            <a href="https://frequencia.nexus-manual.com.br" class="final-button">Acessar o Portal</a>
        </div>
    </div>

    <div class="interaction-zone" id="input-container">
        <input type="text" id="user-input" class="input-pill" placeholder="Escreva aqui..." autocomplete="off">
        <button class="send-trigger" id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    /** * PROCEDURAL SPIRAL GALAXY (THREE.JS)
     */
    const parameters = {
        count: 35000,
        size: 0.008,
        radius: 5,
        branches: 3,
        spin: 1.2,
        randomness: 0.4,
        randomnessPower: 3,
        insideColor: '#0066ff',
        outsideColor: '#e0e0e0'
    };

    let scene, camera, renderer, points, geometry, material;

    const initGalaxy = () => {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        
        // Câmera conforme especificações
        camera.position.z = 4.5;
        camera.position.y = 1.0;
        camera.rotation.x = -0.25;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        if(points) {
            geometry.dispose();
            material.dispose();
            scene.remove(points);
        }

        geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(parameters.count * 3);
        const colors = new Float32Array(parameters.count * 3);

        const colorInside = new THREE.Color(parameters.insideColor);
        const colorOutside = new THREE.Color(parameters.outsideColor);

        for (let i = 0; i < parameters.count; i++) {
            const i3 = i * 3;

            // Posição
            const radius = Math.random() * parameters.radius;
            const spinAngle = radius * parameters.spin;
            const branchAngle = ((i % parameters.branches) / parameters.branches) * Math.PI * 2;

            const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
            const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
            const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;

            positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
            positions[i3 + 1] = randomY;
            positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

            // Cor
            const mixedColor = colorInside.clone();
            mixedColor.lerp(colorOutside, radius / parameters.radius);

            colors[i3] = mixedColor.r;
            colors[i3 + 1] = mixedColor.g;
            colors[i3 + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        material = new THREE.PointsMaterial({
            size: parameters.size,
            sizeAttenuation: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            vertexColors: true
        });

        points = new THREE.Points(geometry, material);
        scene.add(points);
    };

    const clock = new THREE.Clock();

    const animate = () => {
        const elapsedTime = clock.getElapsedTime();
        
        // Rotação conforme especificações
        if(points) points.rotation.y = elapsedTime * 0.05;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initGalaxy();
    animate();

    /**
     * CHAT LOGIC
     */
    const chatFlow = document.getElementById('chat-flow');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const ctaWrapper = document.getElementById('cta-wrapper');
    const inputContainer = document.getElementById('input-container');

    let currentStep = 0;
    let userName = "";

    async function addMessage(content, sender) {
        const bubble = document.createElement('div');
        bubble.className = `bubble ${sender}`;
        chatFlow.insertBefore(bubble, ctaWrapper);
        
        if(sender === 'ai') {
            bubble.classList.add('typing');
            let i = 0;
            while(i < content.length) {
                bubble.innerHTML += content.charAt(i);
                i++;
                chatFlow.scrollTop = chatFlow.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 15));
            }
            bubble.classList.remove('typing');
        } else {
            bubble.textContent = content;
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }
    }

    const script = [
        (name) => `Muito prazer em conhecer, ${name}. Agora me conta, já sentiu que a tua mente está cheia de ruído que te impede de ver o teu verdadeiro potencial?`,
        () => `Pois é, muitas pessoas tentam resolver isso com esforço, mas a verdade é que se trata de sintonização da sua energia. Já ouviu falar em frequências cerebrais?`,
        () => `Exatamente. O que estamos fazendo aqui é recalibrar a tua frequência básica. Estás pronto para um choque de realidade que pode mudar completamente a sua vida?`,
        () => `Ótimo. O último passo é deixar para trás as crenças limitantes. Aceita o desafio de te tornares a versão mais poderosa de ti mesmo?`,
        () => `A sintonização está completa. Acesse nosso conteúdo e faça parte dessa nova transformação.`
    ];

    async function handleInteraction() {
        const text = userInput.value.trim();
        if(!text) return;
        userInput.value = "";
        await addMessage(text, 'user');

        if(currentStep === 0) {
            userName = text.split(' ')[0];
            currentStep = 1;
            await addMessage(`Seja bem-vindo, ${userName}. Vamos iniciar o processo de sintonização.`, 'ai');
            await new Promise(r => setTimeout(r, 600));
        }

        if(currentStep <= script.length) {
            const nextMsg = script[currentStep - 1](userName);
            await addMessage(nextMsg, 'ai');
            currentStep++;
            
            if(currentStep > script.length) {
                inputContainer.style.display = 'none';
                ctaWrapper.style.display = 'block';
                chatFlow.scrollTop = chatFlow.scrollHeight;
            }
        }
    }

    sendBtn.addEventListener('click', handleInteraction);
    userInput.addEventListener('keypress', (e) => e.key === 'Enter' && handleInteraction());

    window.onload = async () => {
        await new Promise(r => setTimeout(r, 800));
        await addMessage("Olá. Para começarmos a sintonizar a tua Frequência Mental Poderosa, diz-me: como te chamas?", "ai");
    };
</script>

</body>
