<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lumo Advisory | Alta Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<!-- Three.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
--bg-color: #030811;
--assistant-bg: rgba(15, 25, 45, 0.92);
--user-bg: rgba(25, 45, 80, 0.85);
--accent-blue: #0055ff;
--accent-silver: #c0c0c0;
--text-main: #FFFFFF;
--text-dim: #A0B0C0;
--gradient-primary: linear-gradient(90deg, #0033cc, #0066ff);
--metallic-silver: linear-gradient(
135deg, 
#f0f0f0 0%, 
#808080 20%, 
#e0e0e0 40%, 
#ffffff 50%, 
#a0a0a0 60%, 
#dcdcdc 80%, 
#f0f0f0 100%
);
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
-webkit-tap-highlight-color: transparent;
}

body {
font-family: 'Inter', sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
line-height: 1.7;
overflow: hidden;
display: flex;
flex-direction: column;
height: 100vh;
position: relative;
}

#galaxy-bg {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
background: #010308;
}

header {
padding: 25px 15px;
text-align: center;
background: rgba(3, 8, 17, 0.75);
backdrop-filter: blur(20px);
z-index: 100;
border-bottom: 1px solid rgba(255,255,255,0.05);
flex-shrink: 0;
}

.logo {
font-size: 1.5rem;
font-weight: 800;
background: var(--metallic-silver);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
letter-spacing: 2px;
}

.sub {
font-size: 0.75rem;
color: var(--text-dim);
letter-spacing: 3px;
margin-top: 5px;
}

.chat-messages {
flex: 1;
overflow-y: auto;
padding: 20px;
display: flex;
flex-direction: column;
gap: 16px;
scroll-behavior: smooth;
}

.message {
max-width: 85%;
padding: 14px 18px;
border-radius: 24px;
font-size: 0.95rem;
line-height: 1.5;
animation: fadeIn 0.3s ease;
word-wrap: break-word;
}

.message strong {
color: #0066ff;
font-weight: 700;
}

.message.assistant {
background: var(--assistant-bg);
backdrop-filter: blur(10px);
border: 1px solid rgba(0,85,255,0.2);
align-self: flex-start;
border-bottom-left-radius: 4px;
color: #e0e8f0;
}

.message.user {
background: var(--user-bg);
backdrop-filter: blur(10px);
border: 1px solid rgba(0,85,255,0.4);
align-self: flex-end;
border-bottom-right-radius: 4px;
color: white;
}

.input-area {
padding: 16px;
background: rgba(3, 8, 17, 0.9);
backdrop-filter: blur(20px);
border-top: 1px solid rgba(255,255,255,0.05);
display: flex;
gap: 12px;
align-items: center;
flex-shrink: 0;
}

.input-area input {
flex: 1;
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 40px;
padding: 14px 20px;
color: white;
font-family: 'Inter', sans-serif;
font-size: 0.9rem;
outline: none;
transition: all 0.2s;
}

.input-area input:focus {
border-color: var(--accent-blue);
background: rgba(255,255,255,0.12);
}

.input-area button {
background: var(--gradient-primary);
border: none;
border-radius: 40px;
padding: 12px 24px;
color: white;
font-weight: 600;
cursor: pointer;
transition: transform 0.2s, opacity 0.2s;
font-family: 'Inter', sans-serif;
}

.input-area button:hover {
transform: scale(1.02);
opacity: 0.9;
}

.cta-button {
display: block;
background: linear-gradient(135deg, #0055ff, #00aaff);
border: none;
border-radius: 60px;
padding: 16px 32px;
margin: 20px auto;
color: white;
font-weight: 800;
font-size: 1.2rem;
cursor: pointer;
text-align: center;
text-decoration: none;
transition: all 0.3s ease;
font-family: 'Inter', sans-serif;
box-shadow: 0 0 20px rgba(0,85,255,0.4);
width: 90%;
max-width: 320px;
letter-spacing: 1px;
}

.cta-button:hover {
transform: scale(1.05);
box-shadow: 0 0 30px rgba(0,85,255,0.6);
background: linear-gradient(135deg, #0066ff, #00bbff);
}

.final-cta-container {
display: none;
text-align: center;
padding: 20px;
animation: fadeInUp 0.6s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar {
width: 5px;
}

::-webkit-scrollbar-track {
background: transparent;
}

::-webkit-scrollbar-thumb {
background: #0055ff;
border-radius: 10px;
}

@media (max-width: 600px) {
.message {
max-width: 90%;
font-size: 0.85rem;
padding: 12px 16px;
}
.input-area button {
padding: 10px 18px;
}
.cta-button {
font-size: 1rem;
padding: 14px 24px;
}
}

.assistant-message-text {
white-space: normal;
word-break: break-word;
}
</style>
</head>
<body>

<div id="galaxy-bg"></div>

<header>
<div class="logo">⚡ LUMO ADVISORY</div>
<div class="sub">HIGH PERFORMANCE ECOSYSTEM</div>
</header>

<div class="chat-messages" id="chat-container">
<div id="final-cta" class="final-cta-container">
<a href="https://frequencia.nexus-manual.com.br" class="cta-button" target="_blank">
🔘 QUERO SABER MAIS
</a>
</div>
</div>

<div class="input-area" id="input-container">
<input type="text" id="user-input" placeholder="Digite sua resposta..." autocomplete="off">
<button id="send-btn">Enviar</button>
</div>

<script>
// THREE.JS GALAXY BACKGROUND
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x010308, 1);
document.getElementById('galaxy-bg').appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const particlesCount = 1800;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount; i++) {
positions[i*3] = (Math.random() - 0.5) * 200;
positions[i*3+1] = (Math.random() - 0.5) * 100;
positions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
}
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const material = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.15, transparent: true, opacity: 0.6 });
const particles = new THREE.Points(geometry, material);
scene.add(particles);

camera.position.z = 30;

function animate() {
requestAnimationFrame(animate);
particles.rotation.y += 0.0005;
particles.rotation.x += 0.0003;
renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- NOVO SCRIPT DE ALTA PERFORMANCE COM BOTÃO FINAL ---

const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const finalCtaDiv = document.getElementById('final-cta');
const inputContainer = document.getElementById('input-container');

let step = 0;
let waitingForResponse = true;

// Mensagens do novo script
const highPerformanceMessages = [
    "Você já sentiu que poderia estar vivendo mais… mas não sabe exatamente o que está faltando?",
    "Já teve a sensação de que existe algo dentro de você… esperando para ser despertado?",
    "Em algum momento, você já se perguntou se a vida que está vivendo hoje… é realmente a vida que você escolheu?",
    "E se, sem perceber, você estiver apenas repetindo padrões… vivendo no automático… distante da sua real capacidade?",
    "Você sente que está explorando tudo o que poderia… ou apenas fazendo o que precisa ser feito?",
    "E se o problema não for falta de esforço… mas falta de clareza?",
    "E se existir uma versão sua — mais forte, mais consciente, mais direcionada — que ainda não teve a chance de emergir?",
    "Agora me diz…\nSe você continuar exatamente como está hoje… para onde isso te leva?",
    "E daqui a alguns anos… você acha que vai se orgulhar… ou se questionar?",
    "O que pesa mais para você:\narriscar mudar… ou permanecer igual?",
    "Porque no fundo, você sabe…\nExiste algo aí dentro que ainda não foi acessado.\nAlgo que você sente… mas não consegue explicar.",
    "E talvez o que esteja faltando… não seja motivação.\nTalvez seja um gatilho.\nUma virada.\nUm ponto de ruptura.",
    "Agora deixa eu te fazer uma pergunta diferente:\n\nE se você encontrasse uma oportunidade de descobrir algo que pudesse mudar tudo?\nAlgo capaz de criar um caos dentro de você…\nmas um caos necessário — aquele que destrói o que te limita para dar origem a uma nova versão sua."
];

let messageIndex = 0;

async function typeText(text, element) {
    element.classList.add('assistant-message-text');
    const words = text.split(" ");
    let currentText = "";
    for (const word of words) {
        currentText += word + " ";
        element.innerHTML = currentText.replace(/\n/g, '<br>');
        chatContainer.scrollTop = chatContainer.scrollHeight;
        await new Promise(resolve => setTimeout(resolve, 25));
    }
}

async function addMessage(text, role) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', role);
    
    // Insere antes do CTA final
    chatContainer.insertBefore(msgDiv, finalCtaDiv);
    
    if (role === 'assistant') {
        await typeText(text, msgDiv);
    } else {
        msgDiv.innerText = text;
    }
    
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return msgDiv;
}

async function sendNextMessage() {
    if (messageIndex < highPerformanceMessages.length) {
        const msg = highPerformanceMessages[messageIndex];
        await addMessage(msg, 'assistant');
        messageIndex++;
        
        // Se chegou ao fim, mostra o botão após pequeno delay
        if (messageIndex === highPerformanceMessages.length) {
            setTimeout(() => {
                inputContainer.style.opacity = '0';
                setTimeout(() => {
                    inputContainer.style.display = 'none';
                    finalCtaDiv.style.display = 'block';
                    chatContainer.scrollTo({
                        top: chatContainer.scrollHeight,
                        behavior: 'smooth'
                    });
                }, 500);
            }, 1000);
        }
    }
}

async function handleUserResponse() {
    const text = userInput.value.trim();
    if (!text) return;
    if (!waitingForResponse) return;
    
    userInput.value = "";
    await addMessage(text, 'user');
    
    waitingForResponse = false;
    
    // Pequena pausa antes da próxima mensagem automática
    setTimeout(() => {
        sendNextMessage();
        waitingForResponse = true;
    }, 600);
}

// Event listeners
sendBtn.addEventListener('click', handleUserResponse);
userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleUserResponse();
});

// Inicia o fluxo automaticamente ao carregar
window.onload = async () => {
    await new Promise(r => setTimeout(r, 800));
    sendNextMessage();
};
</script>

</body>
</html>
