<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lumo Advisory | Alta Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
--bg-color: #030811;
--assistant-bg: rgba(15, 25, 45, 0.92);
--user-bg: rgba(25, 45, 80, 0.85);
--accent-blue: #0055ff;
--text-main: #FFFFFF;
--text-dim: #A0B0C0;
--gradient-primary: linear-gradient(90deg, #0033cc, #0066ff);
--metallic-silver: linear-gradient(135deg, #f0f0f0 0%, #808080 20%, #e0e0e0 40%, #ffffff 50%, #a0a0a0 60%, #dcdcdc 80%, #f0f0f0 100%);
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
-webkit-tap-highlight-color: transparent;
}

body {
font-family: 'Inter', sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
line-height: 1.5;
overflow: hidden;
display: flex;
flex-direction: column;
height: 100vh;
width: 100%;
position: fixed;
top: 0;
left: 0;
}

#galaxy-bg {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
background: #010308;
}

header {
padding: 16px 15px;
text-align: center;
background: rgba(3, 8, 17, 0.85);
backdrop-filter: blur(20px);
z-index: 100;
border-bottom: 1px solid rgba(255,255,255,0.05);
flex-shrink: 0;
}

.logo {
font-size: 1.2rem;
font-weight: 800;
background: var(--metallic-silver);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
letter-spacing: 2px;
}

.sub {
font-size: 0.65rem;
color: var(--text-dim);
letter-spacing: 2px;
margin-top: 3px;
}

.chat-messages {
flex: 1;
overflow-y: auto;
padding: 16px;
display: flex;
flex-direction: column;
gap: 10px;
scroll-behavior: smooth;
-webkit-overflow-scrolling: touch;
}

.message {
max-width: 90%;
padding: 10px 14px;
border-radius: 18px;
font-size: 0.85rem;
line-height: 1.4;
animation: fadeIn 0.3s ease;
word-wrap: break-word;
}

.message strong {
color: #0066ff;
font-weight: 700;
}

.message.assistant {
background: var(--assistant-bg);
backdrop-filter: blur(10px);
border: 1px solid rgba(0,85,255,0.2);
align-self: flex-start;
border-bottom-left-radius: 4px;
color: #e0e8f0;
}

.message.user {
background: var(--user-bg);
backdrop-filter: blur(10px);
border: 1px solid rgba(0,85,255,0.4);
align-self: flex-end;
border-bottom-right-radius: 4px;
color: white;
}

.input-area {
padding: 10px 16px;
padding-bottom: max(10px, env(safe-area-inset-bottom));
background: rgba(3, 8, 17, 0.95);
backdrop-filter: blur(20px);
border-top: 1px solid rgba(255,255,255,0.05);
display: flex;
gap: 8px;
align-items: center;
flex-shrink: 0;
}

.input-area input {
flex: 1;
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 30px;
padding: 10px 16px;
color: white;
font-family: 'Inter', sans-serif;
font-size: 0.85rem;
outline: none;
min-width: 0;
}

.input-area input:focus {
border-color: var(--accent-blue);
background: rgba(255,255,255,0.12);
}

.input-area button {
background: var(--gradient-primary);
border: none;
border-radius: 30px;
padding: 8px 18px;
color: white;
font-weight: 600;
cursor: pointer;
font-family: 'Inter', sans-serif;
flex-shrink: 0;
font-size: 0.85rem;
}

.input-area button:active {
transform: scale(0.97);
}

.cta-button {
display: block;
background: linear-gradient(135deg, #0055ff, #00aaff);
border: none;
border-radius: 60px;
padding: 14px 20px;
margin: 16px auto;
color: white;
font-weight: 800;
font-size: 1rem;
text-align: center;
text-decoration: none;
box-shadow: 0 0 20px rgba(0,85,255,0.4);
width: 85%;
max-width: 260px;
letter-spacing: 1px;
}

.cta-button:active {
transform: scale(0.98);
}

.final-cta-container {
display: none;
text-align: center;
padding: 20px 16px;
animation: fadeInUp 0.6s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar {
width: 3px;
}
::-webkit-scrollbar-thumb {
background: #0055ff;
border-radius: 10px;
}

@media (max-width: 600px) {
.message {
max-width: 95%;
font-size: 0.8rem;
padding: 8px 12px;
}
.logo { font-size: 1rem; }
.sub { font-size: 0.55rem; }
.input-area input { padding: 8px 14px; font-size: 0.8rem; }
.input-area button { padding: 6px 14px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div id="galaxy-bg"></div>

<header>
<div class="logo">⚡ LUMO ADVISORY</div>
<div class="sub">HIGH PERFORMANCE ECOSYSTEM</div>
</header>

<div class="chat-messages" id="chat-container">
<div id="final-cta" class="final-cta-container">
<a href="https://frequencia.nexus-manual.com.br" class="cta-button" target="_blank">
🔘 QUERO SABER MAIS
</a>
</div>
</div>

<div class="input-area" id="input-container">
<input type="text" id="user-input" placeholder="Digite sua resposta..." autocomplete="off">
<button id="send-btn">Enviar</button>
</div>

<script>
// THREE.JS GALAXY BACKGROUND (MESMO DO PRIMEIRO CÓDIGO)
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x010308, 1);
document.getElementById('galaxy-bg').appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const particlesCount = 1800;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount; i++) {
positions[i*3] = (Math.random() - 0.5) * 200;
positions[i*3+1] = (Math.random() - 0.5) * 100;
positions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
}
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const material = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.15, transparent: true, opacity: 0.6 });
const particles = new THREE.Points(geometry, material);
scene.add(particles);
camera.position.z = 30;

function animate() {
requestAnimationFrame(animate);
particles.rotation.y += 0.0005;
particles.rotation.x += 0.0003;
renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- CHAT HUMANO COM NOME E RESPOSTAS COMPREENSIVAS ---
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const finalCtaDiv = document.getElementById('final-cta');
const inputContainer = document.getElementById('input-container');

let step = 0;          // 0: aguardando nome, 1: fluxo principal
let userName = "";
let conversationStage = 0;  // controle das perguntas

async function typeText(text, element) {
    const words = text.split(" ");
    let currentText = "";
    for (const word of words) {
        currentText += word + " ";
        element.innerHTML = currentText.replace(/\n/g, '<br>');
        chatContainer.scrollTop = chatContainer.scrollHeight;
        await new Promise(resolve => setTimeout(resolve, 18));
    }
}

async function addMessage(text, role) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', role);
    chatContainer.insertBefore(msgDiv, finalCtaDiv);
    if (role === 'assistant') {
        await typeText(text, msgDiv);
    } else {
        msgDiv.innerText = text;
    }
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return msgDiv;
}

// Função para extrair nome de forma natural
function extrairNome(input) {
    const patterns = [
        /(?:me chamo|sou o|sou a|meu nome é|chamo-me)\s*([A-Za-zÀ-ÿ]+)/i,
        /^([A-Za-zÀ-ÿ]{2,})/i
    ];
    for (let p of patterns) {
        const match = input.match(p);
        if (match && match[1]) {
            let nome = match[1];
            return nome.charAt(0).toUpperCase() + nome.slice(1).toLowerCase();
        }
    }
    return "";
}

// Respostas humanas baseadas no estágio da conversa
async function continuarConversa(respostaUsuario) {
    if (conversationStage === 0) {
        // Após capturar o nome, faz a primeira pergunta curta
        await addMessage(`Prazer, ${userName}! 🌟\n\nVocê já sentiu que poderia estar vivendo mais, mas não sabe exatamente o que está faltando?`, 'assistant');
        conversationStage = 1;
    } 
    else if (conversationStage === 1) {
        await addMessage(`Entendo, ${userName}. E essa sensação de que existe algo dentro de você esperando para ser despertado... já te acompanha há tempo?`, 'assistant');
        conversationStage = 2;
    }
    else if (conversationStage === 2) {
        await addMessage(`Pode parecer estranho, ${userName}, mas muitos de nós vivemos no automático, repetindo padrões. Você sente que está escolhendo sua vida ou apenas reagindo a ela?`, 'assistant');
        conversationStage = 3;
    }
    else if (conversationStage === 3) {
        await addMessage(`Faz sentido. Agora me diz, ${userName}: se você continuar exatamente como está hoje, para onde isso te leva daqui a alguns anos?`, 'assistant');
        conversationStage = 4;
    }
    else if (conversationStage === 4) {
        await addMessage(`Obrigado por compartilhar. O que pesa mais pra você, ${userName}: arriscar mudar ou permanecer igual?`, 'assistant');
        conversationStage = 5;
    }
    else if (conversationStage === 5) {
        await addMessage(`A verdade é que existe uma versão sua mais forte, mais consciente, que ainda não emergiu. E talvez falte só um gatilho... uma virada.`, 'assistant');
        conversationStage = 6;
    }
    else if (conversationStage === 6) {
        await addMessage(`E se, ${userName}, você encontrasse uma oportunidade de descobrir algo que pudesse mudar tudo? Um caos necessário para destruir o que te limita.`, 'assistant');
        conversationStage = 7;
    }
    else if (conversationStage === 7) {
        await addMessage(`Fico feliz que esteja aberto a isso, ${userName}. Para te ajudar nessa virada, preparei um material especial. Posso liberar seu acesso agora?`, 'assistant');
        conversationStage = 8;
    }
    else if (conversationStage === 8) {
        await addMessage(`Excelente, ${userName}! Então é pra frente que você quer ir.`, 'assistant');
        setTimeout(() => {
            inputContainer.style.opacity = '0';
            setTimeout(() => {
                inputContainer.style.display = 'none';
                finalCtaDiv.style.display = 'block';
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 500);
        }, 1500);
    }
}

async function handleSend() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = "";
    await addMessage(text, 'user');

    if (step === 0) {
        const nome = extrairNome(text);
        if (nome) {
            userName = nome;
            step = 1;
            await continuarConversa("");
        } else {
            await addMessage("Percebi que não me disse seu nome ainda. Como posso te chamar?", 'assistant');
        }
    } else {
        await continuarConversa(text);
    }
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

window.onload = async () => {
    await new Promise(r => setTimeout(r, 600));
    await addMessage("👋 Olá! Eu sou o assistente da Lumo Advisory. Antes de começarmos, me conta: qual é o seu nome?", 'assistant');
};

// Ajuste de scroll no mobile
window.addEventListener('resize', () => {
    setTimeout(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }, 100);
});
</script>
</body>
</html>
