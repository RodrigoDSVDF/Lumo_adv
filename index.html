<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Você está preparado para a era da IA?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        :root {
            --primary: #4f8fff;
            --bg-dark: #010409;
            --glass: rgba(8, 18, 36, 0.85);
            --glass-border: rgba(79, 143, 255, 0.2);
            --user-bubble: rgba(0, 102, 255, 0.2);
            --user-border: rgba(0, 102, 255, 0.5);
            --text: #ffffff;
            --text-soft: #d0d8e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow: hidden;
            position: fixed;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            padding: 22px 16px 10px;
            text-align: center;
            flex-shrink: 0;
            background: linear-gradient(to bottom, rgba(1, 4, 9, 0.95), transparent);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            z-index: 5;
        }

        .title {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #8ab4f8 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
        }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 90%, transparent 100%);
            position: relative;
            z-index: 2;
        }

        .bubble {
            max-width: 85%;
            padding: 13px 17px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.55;
            font-weight: 400;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(16px);
            will-change: transform, opacity;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bubble.ai {
            align-self: flex-start;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            color: var(--text-soft);
            border-bottom-left-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .bubble.user {
            align-self: flex-end;
            background: var(--user-bubble);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--user-border);
            color: #ffffff;
            border-bottom-right-radius: 8px;
            text-align: right;
            box-shadow: 0 8px 24px rgba(0, 102, 255, 0.2);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
            animation: fadeIn 0.3s ease 0.15s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-btn {
            background: rgba(20, 30, 50, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 13px 16px;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .option-btn:active {
            transform: scale(0.97);
            background: rgba(79, 143, 255, 0.2);
            border-color: rgba(79, 143, 255, 0.45);
            box-shadow: 0 0 18px rgba(0, 102, 255, 0.25);
        }

        .option-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        #input-container {
            padding: 10px 16px 22px;
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            background: linear-gradient(to top, rgba(1, 4, 9, 0.95), transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 5;
        }

        #name-input {
            flex: 1;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 13px 18px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        #name-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 143, 255, 0.15);
            background: rgba(25, 38, 62, 0.8);
        }

        #name-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            border-radius: 30px;
            padding: 0 22px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.4);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .send-btn:active {
            transform: scale(0.95);
            background: #2060cc;
        }

        #cta-wrapper {
            padding: 12px 16px 26px;
            flex-shrink: 0;
            display: none;
            background: linear-gradient(to top, rgba(1, 4, 9, 0.95), transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 5;
        }

        .final-button {
            width: 100%;
            background: linear-gradient(135deg, #0066ff, #4f8fff);
            border: none;
            border-radius: 32px;
            padding: 17px 20px;
            color: #fff;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(0, 102, 255, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-align: center;
            animation: pulse-glow 2.5s infinite;
        }

        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 8px 28px rgba(0, 102, 255, 0.5);
            }
            50% {
                box-shadow: 0 8px 42px rgba(0, 150, 255, 0.8);
            }
        }

        .final-button:active {
            transform: scale(0.96);
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.8);
        }

        #chat-flow::-webkit-scrollbar {
            width: 4px;
        }
        #chat-flow::-webkit-scrollbar-track {
            background: transparent;
        }
        #chat-flow::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="app-wrapper">
        <header>
            <div class="title">VOCÊ ESTÁ PREPARADO PARA A ERA DA IA?</div>
        </header>
        <div id="chat-flow"></div>
        <div id="input-container">
            <input type="text" id="name-input" placeholder="Digite seu nome..." autocomplete="off">
            <button class="send-btn" id="send-name-btn">Avançar</button>
        </div>
        <div id="cta-wrapper">
            <button class="final-button" id="final-cta-btn">CONHECER O SISTEMA NEXUS</button>
        </div>
    </div>

    <script>
        (function() {
            // --- THREE.JS BACKGROUND (leve) ---
            const canvasContainer = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 28;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            canvasContainer.appendChild(renderer.domElement);

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 450;
            const posArray = new Float32Array(particlesCount * 3);
            const speedArray = new Float32Array(particlesCount);

            for (let i = 0; i < particlesCount * 3; i += 3) {
                posArray[i] = (Math.random() - 0.5) * 70;
                posArray[i + 1] = (Math.random() - 0.5) * 45;
                posArray[i + 2] = (Math.random() - 0.5) * 35;
                speedArray[i / 3] = 0.003 + Math.random() * 0.007;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.1,
                color: 0x4f8fff,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.6,
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            function animateBackground() {
                requestAnimationFrame(animateBackground);
                const positions = particlesGeometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i + 1] += speedArray[i / 3] * 0.5;
                    if (positions[i + 1] > 22) positions[i + 1] = -22;
                    if (positions[i + 1] < -22) positions[i + 1] = 22;
                }
                particlesGeometry.attributes.position.needsUpdate = true;
                particlesMesh.rotation.y += 0.00015;
                renderer.render(scene, camera);
            }
            animateBackground();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // --- CHAT LOGIC ---
            const chatFlow = document.getElementById('chat-flow');
            const inputContainer = document.getElementById('input-container');
            const nameInput = document.getElementById('name-input');
            const sendNameBtn = document.getElementById('send-name-btn');
            const ctaWrapper = document.getElementById('cta-wrapper');
            const finalCtaBtn = document.getElementById('final-cta-btn');

            let step = 0;
            let userName = '';
            let awaitingOption = false;
            let optionResolver = null;

            function scrollToBottom() {
                requestAnimationFrame(() => {
                    chatFlow.scrollTop = chatFlow.scrollHeight;
                });
            }

            function addMsg(text, sender) {
                return new Promise(resolve => {
                    const bubble = document.createElement('div');
                    bubble.className = `bubble ${sender}`;
                    bubble.innerHTML = text;
                    chatFlow.appendChild(bubble);
                    scrollToBottom();

                    const charCount = text.replace(/<[^>]*>/g, '').length;
                    const readingTime = Math.min(Math.max(charCount * 70, 1600), 3800);
                    setTimeout(resolve, readingTime);
                });
            }

            function removeOptions() {
                const existing = document.querySelector('.options-container');
                if (existing) existing.remove();
            }

            function showOptions(options) {
                removeOptions();
                const container = document.createElement('div');
                container.className = 'options-container';
                options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = `<span class="option-number">${index + 1}</span> ${opt}`;
                    btn.addEventListener('click', () => {
                        if (!awaitingOption) return;
                        const selectedText = `${opt}`;
                        removeOptions();
                        awaitingOption = false;
                        if (optionResolver) {
                            optionResolver({ index, text: selectedText });
                            optionResolver = null;
                        }
                    });
                    container.appendChild(btn);
                });
                chatFlow.appendChild(container);
                scrollToBottom();
            }

            function waitForOption(options) {
                return new Promise(resolve => {
                    awaitingOption = true;
                    optionResolver = resolve;
                    showOptions(options);
                });
            }

            async function runNarrative() {
                if (step === 1) {
                    await addMsg(
                        `Prazer em conhecê-lo, ${userName}.<br><br>Vou fazer algumas perguntas rápidas para entender seu perfil.`,
                        'ai'
                    );

                    const choice = await waitForOption([
                        'Muitas ideias, mas dificuldade para executar',
                        'Estudo bastante, mas esqueço o que aprendo',
                        'Perco muito tempo com tarefas repetitivas',
                        'Dificuldade para manter foco e disciplina',
                    ]);

                    await addMsg(choice.text, 'user');
                    step = 2;
                    runNarrative();
                } else if (step === 2) {
                    await addMsg(
                        `Entendi.<br><br>Você utiliza Inteligência Artificial atualmente?`,
                        'ai'
                    );

                    const choice = await waitForOption([
                        'Nunca utilizei',
                        'Utilizo ocasionalmente',
                        'Utilizo frequentemente',
                        'Utilizo todos os dias',
                    ]);

                    await addMsg(choice.text, 'user');
                    step = 3;
                    runNarrative();
                } else if (step === 3) {
                    await addMsg(
                        `Se pudesse melhorar apenas UMA habilidade, qual seria?`,
                        'ai'
                    );

                    const choice = await waitForOption([
                        'Aprender mais rápido',
                        'Ser mais produtivo',
                        'Organizar melhor minha rotina',
                        'Tomar decisões melhores',
                    ]);

                    await addMsg(choice.text, 'user');
                    step = 4;
                    runNarrative();
                } else if (step === 4) {
                    await addMsg(`Analisando suas respostas...`, 'ai');
                    await new Promise(r => setTimeout(r, 1400));

                    await addMsg(
                        `${userName}, o problema não parece ser falta de capacidade.`,
                        'ai'
                    );
                    await new Promise(r => setTimeout(r, 1000));

                    await addMsg(
                        `Também não parece ser falta de informação.`,
                        'ai'
                    );
                    await new Promise(r => setTimeout(r, 1000));

                    await addMsg(
                        `O padrão mais comum é:<br><br>❌ Excesso de informação<br>❌ Falta de organização mental<br>❌ Ausência de um sistema de execução`,
                        'ai'
                    );
                    step = 5;
                    runNarrative();
                } else if (step === 5) {
                    await addMsg(
                        `Quem evolui mais rápido não consome mais conteúdo.`,
                        'ai'
                    );
                    await new Promise(r => setTimeout(r, 1000));

                    await addMsg(
                        `Possui um sistema para transformar:<br><br>Informação → Conhecimento<br>Conhecimento → Decisão<br>Decisão → Ação`,
                        'ai'
                    );
                    step = 6;
                    runNarrative();
                } else if (step === 6) {
                    await addMsg(
                        `Foi para isso que criamos o Nexus Manual.`,
                        'ai'
                    );
                    await new Promise(r => setTimeout(r, 1000));

                    await addMsg(
                        `Um sistema que integra:<br><br>✓ Inteligência Artificial<br>✓ Aprendizagem Estratégica<br>✓ Organização Mental<br>✓ Produtividade<br>✓ Execução`,
                        'ai'
                    );
                    await new Promise(r => setTimeout(r, 1000));

                    await addMsg(
                        `Veja como tudo isso funciona na prática.`,
                        'ai'
                    );

                    inputContainer.style.display = 'none';
                    ctaWrapper.style.display = 'block';
                    scrollToBottom();
                }
            }

            async function startChat() {
                await new Promise(r => setTimeout(r, 700));
                await addMsg(
                    `Bem-vindo.<br><br>Este é um diagnóstico rápido para descobrir se você está pronto para aprender, produzir e decidir na era da IA.<br><br>Leva menos de 2 minutos.<br><br>Qual é o seu nome?`,
                    'ai'
                );
            }

            function submitName() {
                const name = nameInput.value.trim();
                if (!name) {
                    nameInput.style.borderColor = '#ff4d4d';
                    nameInput.focus();
                    setTimeout(() => { nameInput.style.borderColor = ''; }, 1500);
                    return;
                }
                userName = name;
                addMsg(name, 'user').then(() => {
                    inputContainer.style.display = 'none';
                    step = 1;
                    runNarrative();
                });
            }

            sendNameBtn.addEventListener('click', submitName);
            nameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitName();
            });

            finalCtaBtn.addEventListener('click', () => {
                // Redirecionamento para o link solicitado
                window.location.href = 'https://app.nexus-manual.com.br/';
            });

            window.onload = () => {
                startChat();
            };
        })();
    </script>
</body>
</html>
