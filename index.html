<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diagnóstico Nexus Manual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #4f8fff;
            --bg-dark: #010409;
            --glass: rgba(8, 18, 36, 0.85);
            --glass-border: rgba(79, 143, 255, 0.2);
            --user-bubble: rgba(0, 102, 255, 0.2);
            --user-border: rgba(0, 102, 255, 0.5);
            --text: #ffffff;
            --text-soft: #d0d8e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow: hidden;
            position: fixed;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        header {
            padding: 22px 16px 10px;
            text-align: center;
            flex-shrink: 0;
            background: linear-gradient(to bottom, rgba(1, 4, 9, 0.95), transparent);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            z-index: 5;
        }

        .title {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #8ab4f8 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
        }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 90%, transparent 100%);
            position: relative;
            z-index: 2;
        }

        .bubble {
            max-width: 85%;
            padding: 13px 17px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.55;
            font-weight: 400;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(16px);
            will-change: transform, opacity;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble.ai {
            align-self: flex-start;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            color: var(--text-soft);
            border-bottom-left-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .bubble.user {
            align-self: flex-end;
            background: var(--user-bubble);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--user-border);
            color: #ffffff;
            border-bottom-right-radius: 8px;
            text-align: right;
            box-shadow: 0 8px 24px rgba(0,102,255,0.2);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
            animation: fadeIn 0.3s ease 0.15s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-btn {
            background: rgba(20,30,50,0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 13px 16px;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .option-btn:active {
            transform: scale(0.97);
            background: rgba(79,143,255,0.2);
            border-color: rgba(79,143,255,0.45);
            box-shadow: 0 0 18px rgba(0,102,255,0.25);
        }

        .option-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        #input-container {
            padding: 10px 12px 22px;
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            background: linear-gradient(to top, rgba(1,4,9,0.95), transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 5;
        }

        #name-input {
            flex: 1;
            min-width: 0;
            background: rgba(20,30,50,0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 13px 18px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        #name-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,143,255,0.15);
            background: rgba(25,38,62,0.8);
        }

        #name-input::placeholder {
            color: rgba(255,255,255,0.35);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(0,102,255,0.4);
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
            background: #2060cc;
        }

        @media (max-width: 400px) {
            #input-container { padding: 10px 10px 22px; gap: 6px; }
            .send-btn { padding: 0 16px; font-size: 0.8rem; }
            #name-input { padding: 12px 16px; font-size: 0.9rem; }
        }

        @media (max-width: 360px) {
            #input-container { padding: 10px 8px 22px; gap: 5px; }
            .send-btn { padding: 0 12px; font-size: 0.75rem; }
            #name-input { padding: 12px 12px; font-size: 0.85rem; }
        }

        @media (max-width: 320px) {
            #input-container { padding: 10px 6px 22px; gap: 4px; }
            .send-btn { padding: 0 10px; font-size: 0.7rem; }
            #name-input { padding: 10px 10px; font-size: 0.8rem; }
        }

        #cta-wrapper {
            padding: 12px 16px 26px;
            flex-shrink: 0;
            display: none;
            background: linear-gradient(to top, rgba(1,4,9,0.95), transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 5;
        }

        .final-button {
            width: 100%;
            background: linear-gradient(135deg, #0066ff, #4f8fff);
            border: none;
            border-radius: 32px;
            padding: 17px 20px;
            color: #fff;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(0,102,255,0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-align: center;
            animation: pulse-glow 2.5s infinite;
        }

        @keyframes pulse-glow {
            0%,100% { box-shadow: 0 8px 28px rgba(0,102,255,0.5); }
            50% { box-shadow: 0 8px 42px rgba(0,150,255,0.8); }
        }

        .final-button:active {
            transform: scale(0.96);
            box-shadow: 0 4px 20px rgba(0,102,255,0.8);
        }

        #chat-flow::-webkit-scrollbar { width: 4px; }
        #chat-flow::-webkit-scrollbar-track { background: transparent; }
        #chat-flow::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="app-wrapper">
    <header>
        <div class="title">Você está preparado para a era da IA?</div>
    </header>
    <div id="chat-flow"></div>
    <div id="input-container">
        <input type="text" id="name-input" placeholder="Digite seu nome..." autocomplete="off">
        <button class="send-btn" id="send-name-btn">Avançar</button>
    </div>
    <div id="cta-wrapper">
        <button class="final-button" id="final-cta-btn">QUERO MEU DIAGNÓSTICO COMPLETO</button>
    </div>
</div>

<script>
(function() {
    // --- THREE.JS BACKGROUND ---
    const canvasContainer = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 28;
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    canvasContainer.appendChild(renderer.domElement);

    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 450;
    const posArray = new Float32Array(particlesCount * 3);
    const speedArray = new Float32Array(particlesCount);
    for (let i=0; i<particlesCount*3; i+=3) {
        posArray[i] = (Math.random()-0.5)*70;
        posArray[i+1] = (Math.random()-0.5)*45;
        posArray[i+2] = (Math.random()-0.5)*35;
        speedArray[i/3] = 0.003 + Math.random()*0.007;
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray,3));
    const particlesMaterial = new THREE.PointsMaterial({
        size: 0.1, color: 0x4f8fff, blending: THREE.AdditiveBlending,
        depthWrite: false, transparent: true, opacity: 0.6
    });
    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);

    function animateBackground() {
        requestAnimationFrame(animateBackground);
        const positions = particlesGeometry.attributes.position.array;
        for (let i=0; i<positions.length; i+=3) {
            positions[i+1] += speedArray[i/3]*0.5;
            if (positions[i+1] > 22) positions[i+1] = -22;
            if (positions[i+1] < -22) positions[i+1] = 22;
        }
        particlesGeometry.attributes.position.needsUpdate = true;
        particlesMesh.rotation.y += 0.00015;
        renderer.render(scene, camera);
    }
    animateBackground();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- CHAT LOGIC ---
    const chatFlow = document.getElementById('chat-flow');
    const inputContainer = document.getElementById('input-container');
    const nameInput = document.getElementById('name-input');
    const sendNameBtn = document.getElementById('send-name-btn');
    const ctaWrapper = document.getElementById('cta-wrapper');
    const finalCtaBtn = document.getElementById('final-cta-btn');

    let step = 0;
    let userName = '';
    let awaitingOption = false;
    let optionResolver = null;

    // 7 dimensões do perfil
    const profile = {
        perfil: null,        // Q1
        ia: null,            // Q2
        habilidade: null,    // Q3
        informacao: null,    // Q4
        obstaculo: null,     // Q5
        aprendizado: null,   // Q6
        forca: null          // Q7
    };

    function scrollToBottom() {
        requestAnimationFrame(() => { chatFlow.scrollTop = chatFlow.scrollHeight; });
    }

    function addMsg(text, sender) {
        return new Promise(resolve => {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${sender}`;
            bubble.innerHTML = text;
            chatFlow.appendChild(bubble);
            scrollToBottom();
            const charCount = text.replace(/<[^>]*>/g, '').length;
            const readingTime = Math.min(Math.max(charCount * 60, 1200), 4000);
            setTimeout(resolve, readingTime);
        });
    }

    function removeOptions() {
        const existing = document.querySelector('.options-container');
        if (existing) existing.remove();
    }

    function showOptions(options) {
        removeOptions();
        const container = document.createElement('div');
        container.className = 'options-container';
        options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="option-number">${index+1}</span> ${opt}`;
            btn.addEventListener('click', () => {
                if (!awaitingOption) return;
                removeOptions();
                awaitingOption = false;
                if (optionResolver) {
                    optionResolver({ index, text: opt });
                    optionResolver = null;
                }
            });
            container.appendChild(btn);
        });
        chatFlow.appendChild(container);
        scrollToBottom();
    }

    function waitForOption(options) {
        return new Promise(resolve => {
            awaitingOption = true;
            optionResolver = resolve;
            showOptions(options);
        });
    }

    function gerarDiagnostico(p) {
        let tipo = '';
        let pontosFortes = [];
        let pontosAtencao = [];
        let recomendacao = '';

        if (p.perfil === 0 && p.obstaculo === 0) {
            tipo = 'Criativo Bloqueado';
            pontosFortes.push('Grande capacidade de ideação e criatividade');
            pontosFortes.push('Visão ampla e pensamento divergente');
            pontosAtencao.push('Dificuldade em transformar ideias em ações concretas');
            pontosAtencao.push('Tendência a se dispersar com múltiplas possibilidades');
            recomendacao = 'Você precisa de um sistema que canalize sua criatividade para execução, com priorização clara e marcos de entrega.';
        } else if (p.perfil === 1 && p.informacao <= 1) {
            tipo = 'Estudante Sobrecarregado';
            pontosFortes.push('Dedicação aos estudos e busca por conhecimento');
            pontosFortes.push('Capacidade de absorver grande volume de informações');
            pontosAtencao.push('Baixa retenção e aplicação prática do que aprende');
            pontosAtencao.push('Sobrecarga informacional gerando paralisia');
            recomendacao = 'Seu desafio não é aprender mais, mas sim organizar e aplicar o conhecimento. Um método de síntese e revisão é essencial.';
        } else if (p.perfil === 2 && p.ia >= 2) {
            tipo = 'Executante Disperso';
            pontosFortes.push('Disposição para agir e realizar tarefas');
            pontosFortes.push('Familiaridade com ferramentas de IA');
            pontosAtencao.push('Perda de tempo com atividades repetitivas que poderiam ser automatizadas');
            pontosAtencao.push('Falta de um fluxo de trabalho otimizado');
            recomendacao = 'Você já usa tecnologia, mas ainda não extrai o máximo dela. Automatize processos e libere tempo para o estratégico.';
        } else if (p.habilidade === 0 && p.aprendizado === 1) {
            tipo = 'Aprendiz Visual';
            pontosFortes.push('Alta motivação para aprender');
            pontosFortes.push('Preferência por formatos visuais e interativos');
            pontosAtencao.push('Pode se frustrar com métodos tradicionais de estudo');
            pontosAtencao.push('Necessidade de estímulos variados para manter o foco');
            recomendacao = 'Combine mapas mentais, vídeos e prática ativa. O Nexus Manual oferece exatamente essa abordagem multimodal.';
        } else if (p.forca === 0 && p.obstaculo === 2) {
            tipo = 'Estrategista com Propósito';
            pontosFortes.push('Resiliência e determinação notáveis');
            pontosFortes.push('Capacidade de superar adversidades');
            pontosAtencao.push('Falta de clareza nos objetivos de longo prazo');
            pontosAtencao.push('Risco de se esforçar muito na direção errada');
            recomendacao = 'Defina metas claras e mensuráveis. Sua força precisa de um alvo bem definido para gerar resultados extraordinários.';
        } else if (p.ia === 0 && p.informacao === 0) {
            tipo = 'Explorador Iniciante';
            pontosFortes.push('Mente fresca e sem vícios tecnológicos');
            pontosFortes.push('Potencial para adotar as melhores práticas desde o início');
            pontosAtencao.push('Desconexão com as ferramentas atuais de produtividade');
            pontosAtencao.push('Sobrecarga informacional sem filtros');
            recomendacao = 'Comece com o básico: um sistema de gestão de informações e introdução gradual à IA como assistente pessoal.';
        } else if (p.ia === 3 && p.informacao >= 2) {
            tipo = 'Tecnologista Avançado';
            pontosFortes.push('Uso intensivo de IA e tecnologia');
            pontosFortes.push('Alta exposição a informações relevantes');
            pontosAtencao.push('Risco de dependência tecnológica sem critério próprio');
            pontosAtencao.push('Pode estar consumindo mais do que produzindo');
            recomendacao = 'Você está na fronteira. Agora precisa de um sistema de curadoria e execução que vá além da IA, integrando sua intuição e decisão estratégica.';
        } else if (p.aprendizado === 2 || p.aprendizado === 3) {
            tipo = 'Prático Experimentador';
            pontosFortes.push('Aprendizado focado na prática e na experiência direta');
            pontosFortes.push('Capacidade de aprender fazendo');
            pontosAtencao.push('Pode pular etapas importantes de fundamentação');
            pontosAtencao.push('Necessidade de equilibrar teoria e prática');
            recomendacao = 'Alterne entre ciclos de estudo e aplicação imediata. O método "aprender-praticar-ensinar" será seu maior aliado.';
        } else if (p.forca === 2 && p.habilidade === 2) {
            tipo = 'Organizador Natural';
            pontosFortes.push('Talento para estruturar e organizar');
            pontosFortes.push('Busca por eficiência e ordem');
            pontosAtencao.push('Pode se prender demais a sistemas e perder flexibilidade');
            pontosAtencao.push('Risco de perfeccionismo paralisante');
            recomendacao = 'Use sua habilidade organizacional para criar um sistema pessoal, mas lembre-se: a ação imperfeita supera o planejamento perfeito.';
        } else {
            tipo = 'Em Transição';
            pontosFortes.push('Autoconhecimento em desenvolvimento');
            pontosFortes.push('Disposição para identificar áreas de melhoria');
            pontosAtencao.push('Múltiplas frentes para trabalhar simultaneamente');
            pontosAtencao.push('Necessidade de um plano estruturado de evolução');
            recomendacao = 'Seu perfil indica que você está no momento certo para adotar um sistema integrado. O Nexus Manual foi desenhado para pessoas exatamente como você.';
        }

        if (p.ia >= 2) pontosFortes.push('Familiaridade com IA como vantagem competitiva');
        if (p.habilidade === 3) pontosFortes.push('Busca por clareza decisória – sinal de maturidade');
        if (p.obstaculo === 1) pontosAtencao.push('Gestão do tempo é uma oportunidade de melhoria imediata');
        if (p.forca === 1) pontosFortes.push('Criatividade como diferencial para inovação');
        if (p.forca === 3) pontosFortes.push('Capacidade analítica para resolver problemas complexos');

        return {
            tipo,
            pontosFortes: [...new Set(pontosFortes)],
            pontosAtencao: [...new Set(pontosAtencao)],
            recomendacao
        };
    }

    async function runNarrative() {
        if (step === 1) {
            await addMsg(
                `Prazer, ${userName}.<br><br>Sabia que <strong>8 em cada 10 pessoas</strong> que fazem este teste descobrem que o problema não é falta de capacidade, mas de método?<br><br>Vamos descobrir o seu caso.`,
                'ai'
            );
            await new Promise(r => setTimeout(r, 800));

            const choice = await waitForOption([
                'Muitas ideias, mas dificuldade para executar',
                'Estudo bastante, mas esqueço o que aprendo',
                'Perco tempo com tarefas repetitivas',
                'Dificuldade para manter foco e disciplina'
            ]);
            profile.perfil = choice.index;
            await addMsg(choice.text, 'user');
            step = 2; runNarrative();
        } else if (step === 2) {
            await addMsg(`Qual é a sua relação atual com a Inteligência Artificial?`, 'ai');
            const choice = await waitForOption([
                'Nunca utilizei',
                'Utilizo ocasionalmente',
                'Utilizo frequentemente',
                'Utilizo todos os dias'
            ]);
            profile.ia = choice.index;
            await addMsg(choice.text, 'user');
            step = 3; runNarrative();
        } else if (step === 3) {
            await addMsg(`Se pudesse melhorar apenas UMA habilidade, qual seria?`, 'ai');
            const choice = await waitForOption([
                'Aprender mais rápido',
                'Ser mais produtivo',
                'Organizar melhor minha rotina',
                'Tomar decisões melhores'
            ]);
            profile.habilidade = choice.index;
            await addMsg(choice.text, 'user');
            step = 4; runNarrative();
        } else if (step === 4) {
            await addMsg(`Como você se sente em relação ao volume de informações que consome?`, 'ai');
            const choice = await waitForOption([
                'Sobrecarregado, mal consigo processar',
                'Intenso, mas ainda dou conta',
                'Razoável, mas poderia aproveitar melhor',
                'Tranquilo, mas falta um método'
            ]);
            profile.informacao = choice.index;
            await addMsg(choice.text, 'user');
            step = 5; runNarrative();
        } else if (step === 5) {
            await addMsg(`O que mais te impede de alcançar seus objetivos?`, 'ai');
            const choice = await waitForOption([
                'Foco e concentração',
                'Gestão do tempo',
                'Falta de clareza nos objetivos',
                'Motivação inconstante'
            ]);
            profile.obstaculo = choice.index;
            await addMsg(choice.text, 'user');
            step = 6; runNarrative();
        } else if (step === 6) {
            await addMsg(`Como você aprende melhor?`, 'ai');
            const choice = await waitForOption([
                'Lendo e fazendo anotações',
                'Assistindo vídeos e ouvindo explicações',
                'Praticando e experimentando',
                'Ensinando ou discutindo com outros'
            ]);
            profile.aprendizado = choice.index;
            await addMsg(choice.text, 'user');
            step = 7; runNarrative();
        } else if (step === 7) {
            await addMsg(`Qual você considera sua maior força?`, 'ai');
            const choice = await waitForOption([
                'Resiliência e determinação',
                'Criatividade e inovação',
                'Organização e planejamento',
                'Análise e pensamento crítico'
            ]);
            profile.forca = choice.index;
            await addMsg(choice.text, 'user');
            step = 8; runNarrative();
        } else if (step === 8) {
            await addMsg(`Processando seu diagnóstico personalizado...`, 'ai');
            await new Promise(r => setTimeout(r, 1800));
            const diag = gerarDiagnostico(profile);
            await addMsg(
                `<strong>${userName}, seu perfil é: ${diag.tipo}</strong><br><br>` +
                `✅ <strong>Forças:</strong><br>• ${diag.pontosFortes.join('<br>• ')}<br><br>` +
                `⚠️ <strong>Atenção:</strong><br>• ${diag.pontosAtencao.join('<br>• ')}`,
                'ai'
            );
            await new Promise(r => setTimeout(r, 2500));
            await addMsg(
                `<strong>Recomendação personalizada:</strong><br>${diag.recomendacao}<br><br>O Nexus Manual foi criado exatamente para isso.`,
                'ai'
            );
            step = 9; runNarrative();
        } else if (step === 9) {
            await addMsg(`Clique no botão abaixo para ver como o sistema funciona na prática e ter acesso ao diagnóstico completo.`, 'ai');
            inputContainer.style.display = 'none';
            ctaWrapper.style.display = 'block';
            scrollToBottom();
        }
    }

    async function startChat() {
        await new Promise(r => setTimeout(r, 600));
        // Mensagem de abertura com identidade e autoridade
        await addMsg(
            `<strong>Bem-vindo ao Nexus Manual.</strong><br><br>Sou Lucas Mendes, especialista em aceleração de aprendizado e produtividade.<br><br>Criei este diagnóstico de 2 minutos para ajudar você a identificar o que está bloqueando sua evolução na era da IA.<br><br>Qual é o seu nome?`,
            'ai'
        );
    }

    function submitName() {
        const name = nameInput.value.trim();
        if (!name) {
            nameInput.style.borderColor = '#ff4d4d';
            nameInput.focus();
            setTimeout(() => { nameInput.style.borderColor = ''; }, 1500);
            return;
        }
        userName = name;
        addMsg(name, 'user').then(() => {
            inputContainer.style.display = 'none';
            step = 1;
            runNarrative();
        });
    }

    sendNameBtn.addEventListener('click', submitName);
    nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitName(); });

    finalCtaBtn.addEventListener('click', () => {
        // Captura o lead no localStorage antes de redirecionar
        const leadData = {
            nome: userName,
            perfil: profile.perfil,
            ia: profile.ia,
            habilidade: profile.habilidade,
            informacao: profile.informacao,
            obstaculo: profile.obstaculo,
            aprendizado: profile.aprendizado,
            forca: profile.forca,
            data: new Date().toISOString()
        };
        localStorage.setItem('nexus_lead', JSON.stringify(leadData));

        // Feedback visual
        finalCtaBtn.textContent = 'Salvando...';
        finalCtaBtn.style.opacity = '0.7';
        setTimeout(() => {
            window.location.href = 'https://app.nexus-manual.com.br/';
        }, 600);
    });

    window.onload = () => { startChat(); };
})();
</script>
</body>
</html>
